<!doctype html>
<html>
    <head>
        <meta name='viewport' content="width='device-width, initial-scale=1'">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
    <body>
        <div id="total-ui">
            <h1>Generate a <span id="random-password">random password</span></h1>
            <p>Never use an insecure password again.</p>
            <div id="input-and-button">
                <input type="number" placeholder="Enter the password length" id="input">
                <div id="togglebars">
                    <div id="togglesection">
                        <p class="toggleheaders">Numbers</p>
                        <input id=toggle1 class="togglebox" type="checkbox">
                    </div>
                    <div id="togglesection">
                        <p class="toggleheaders">Symbols</p>
                        <input id=toggle2 class="togglebox" type="checkbox">
                    </div>
                </div>
                <button id="button" onclick="showPassword()">Generate passwords</button>
                <p id="min-password-length"></p>
                <p id="max-password-length"></p>
            </div>
            <div id="line">
                <div>
                    <p class="password" id="password1"></p>
                    <button class="copy" onclick="copy1()">Copy</button>
                </div>
                <div>
                    <p class="password" id="password2"></p>
                    <button class="copy" onclick="copy2()">Copy</button>
                </div>
            </div>
            <p id="message"></p>
            <p id="error"></p>
            <script src="index.js"></script>
        </div>
    </body>
</html>
